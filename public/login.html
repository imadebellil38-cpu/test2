<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProspectHunter — Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #ffffff;
      --grad: linear-gradient(135deg, #e06030 0%, #f0915a 100%);
      --grad2: linear-gradient(135deg, #1863DC 0%, #4f9cf7 100%);
      --glow: rgba(224,96,48,.2);
      --text: #0f0f0f;
      --text2: #555555;
      --muted: #999999;
      --border: rgba(0,0,0,.08);
      --border2: rgba(0,0,0,.12);
    }

    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative;
      -webkit-font-smoothing: antialiased;
      background: linear-gradient(180deg, #fff 0%, #f8f8fa 100%);
    }

    /* ── ANIMATED BACKGROUND ── */
    .bg-orbs {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
    }
    .orb {
      position: absolute; border-radius: 50%; filter: blur(80px); opacity: .25;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .orb-1 { width: 600px; height: 600px; background: #e06030; top: -200px; left: -150px; animation-delay: 0s; opacity: .08; }
    .orb-2 { width: 500px; height: 500px; background: #1863DC; bottom: -150px; right: -100px; animation-delay: -4s; opacity: .06; }
    .orb-3 { width: 300px; height: 300px; background: #f0915a; top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -8s; opacity: .06; }

    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, 20px) scale(1.1); }
    }

    /* Grid overlay */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(224,96,48,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(224,96,48,.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* ── FLOATING PARTICLES ── */
    canvas#sparks { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* ── CARD ── */
    .login-wrap {
      position: relative; z-index: 10;
      width: 100%; max-width: 420px; padding: 1rem;
      animation: slideUp .6s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-box {
      background: rgba(255, 255, 255, .92);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 2.5rem;
      backdrop-filter: blur(30px);
      box-shadow:
        0 0 0 1px rgba(224,96,48,.1),
        0 20px 60px rgba(0,0,0,.08),
        0 0 80px rgba(224,96,48,.12);
    }

    /* ── LOGO ── */
    .logo { text-align: center; margin-bottom: 2rem; }
    .logo-icon {
      width: 56px; height: 56px; margin: 0 auto .8rem;
      background: var(--grad); border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem;
      box-shadow: 0 8px 30px var(--glow);
      animation: pulse-logo 3s ease-in-out infinite;
    }
    @keyframes pulse-logo {
      0%, 100% { box-shadow: 0 8px 30px var(--glow); }
      50%       { box-shadow: 0 8px 50px rgba(224,96,48,.6); }
    }
    .logo h1 {
      font-size: 1.5rem; font-weight: 900; letter-spacing: -.04em;
      background: var(--grad);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .logo p { color: var(--muted); font-size: .82rem; margin-top: .3rem; }

    /* ── TABS ── */
    .tabs {
      display: flex; gap: .4rem; margin-bottom: 1.5rem;
      background: rgba(255,255,255,.03); border-radius: 12px; padding: .3rem;
    }
    .tab {
      flex: 1; padding: .55rem; border: none; border-radius: 9px;
      background: transparent; color: var(--muted);
      font-size: .8rem; font-weight: 700; cursor: pointer; font-family: inherit;
      transition: all .2s; text-align: center;
    }
    .tab:hover { color: var(--text2); }
    .tab.on {
      background: var(--grad); color: #fff;
      box-shadow: 0 4px 15px var(--glow);
    }

    /* ── FORM ── */
    .form { display: none; }
    .form.on { display: block; }

    .field { margin-bottom: 1rem; }
    .field label {
      display: block; font-size: .68rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .07em; margin-bottom: .4rem;
    }
    .inp-wrap { position: relative; }
    .inp {
      width: 100%; background: rgba(0,0,0,.03);
      border: 1px solid rgba(224,96,48,.2);
      border-radius: 10px; padding: .75rem 1rem; color: var(--text);
      font-size: .88rem; outline: none; font-family: inherit;
      transition: all .2s;
    }
    .inp:focus {
      border-color: rgba(224,96,48,.6);
      box-shadow: 0 0 0 3px rgba(224,96,48,.1);
      background: rgba(224,96,48,.06);
    }
    .inp::placeholder { color: var(--muted); }

    /* ── BUTTON ── */
    .btn {
      width: 100%; padding: .9rem; margin-top: .75rem;
      background: var(--grad); color: #fff; border: none; border-radius: 10px;
      font-size: .92rem; font-weight: 800; cursor: pointer; font-family: inherit;
      transition: all .2s; position: relative; overflow: hidden;
      box-shadow: 0 6px 25px var(--glow);
    }
    .btn::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(rgba(255,255,255,.15), transparent);
      opacity: 0; transition: opacity .2s;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 10px 35px var(--glow); }
    .btn:hover::before { opacity: 1; }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    /* Shimmer on hover */
    .btn::after {
      content: '';
      position: absolute; top: -50%; left: -60%;
      width: 40%; height: 200%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.2), transparent);
      transform: skewX(-20deg);
      transition: left .5s ease;
    }
    .btn:hover::after { left: 130%; }

    /* ── MESSAGES ── */
    .error, .success {
      border-radius: 10px; padding: .7rem 1rem; font-size: .82rem;
      margin-bottom: 1rem; display: none; animation: fadeIn .3s ease;
    }
    .error.on { display: block; background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); color: #f87171; }
    .success.on { display: block; background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.3); color: #4ade80; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

    /* ── FOOTER ── */
    .login-footer {
      text-align: center; margin-top: 1.5rem;
      font-size: .75rem; color: var(--muted);
    }
    .login-footer a {
      background: var(--grad); -webkit-background-clip: text;
      -webkit-text-fill-color: transparent; background-clip: text;
      font-weight: 600;
    }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: .8rem;
      margin: 1rem 0; color: var(--muted); font-size: .7rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
  </style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<canvas id="sparks"></canvas>

<div class="login-wrap">
  <div class="login-box">
    <div class="logo">
      <div class="logo-icon">🎯</div>
      <h1>ProspectHunter</h1>
      <p>Ton empire commence ici 👑</p>
    </div>

    <div class="tabs">
      <button class="tab on" onclick="showTab('login')">J'ai un compte 😎</button>
      <button class="tab" onclick="showTab('register')">Je veux ma place 🔥</button>
    </div>

    <div id="error" class="error"></div>
    <div id="success" class="success"></div>

    <div id="form-login" class="form on">
      <div class="field">
        <label>Email</label>
        <input class="inp" type="email" id="login-email" placeholder="tonmail@business.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <input class="inp" type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn" id="btn-login" onclick="doLogin()">Let's go 🚀</button>
    </div>

    <div id="form-register" class="form">
      <div class="field">
        <label>Email</label>
        <input class="inp" type="email" id="reg-email" placeholder="boss@empire.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <input class="inp" type="password" id="reg-pass" placeholder="6 caractères minimum" autocomplete="new-password">
      </div>
      <div class="field">
        <label>Confirmer</label>
        <input class="inp" type="password" id="reg-pass2" placeholder="Le même, confirme bb" autocomplete="new-password">
      </div>
      <button class="btn" id="btn-register" onclick="doRegister()">Créer mon empire 👑</button>
    </div>

    <div class="login-footer">
      <a href="/">← Retour à l'accueil</a>
    </div>
  </div>
</div>

<script>
// ── SPARKS ──
const canvas = document.getElementById('sparks');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize(); addEventListener('resize', resize);

class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.r = Math.random() * 1.5 + .3;
    this.vx = (Math.random() - .5) * .3;
    this.vy = -Math.random() * .5 - .1;
    this.life = 1; this.decay = Math.random() * .003 + .001;
    this.hue = Math.random() < .5 ? 260 : 200;
  }
  update() {
    this.x += this.vx; this.y += this.vy; this.life -= this.decay;
    if (this.life <= 0) this.reset();
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${this.hue},80%,70%,${this.life * .6})`;
    ctx.fill();
  }
}

for (let i = 0; i < 120; i++) particles.push(new Particle());
(function loop() {
  ctx.clearRect(0, 0, W, H);
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(loop);
})();

// ── AUTH ──
if (localStorage.getItem('ph_token')) window.location.href = '/app';

const urlParams = new URLSearchParams(location.search);
const refCode = urlParams.get('ref');
if (urlParams.get('tab') === 'register') setTimeout(() => showTab('register'), 50);
if (refCode) setTimeout(() => { showTab('register'); showSuccess('Ton pote t\'a invité ! +5 crédits gratuits 🎁'); }, 100);

function showTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('on', i === (tab === 'login' ? 0 : 1)));
  document.getElementById('form-login').classList.toggle('on', tab === 'login');
  document.getElementById('form-register').classList.toggle('on', tab === 'register');
  hideMessages();
}
function showError(msg) { const e = document.getElementById('error'); e.textContent = msg; e.classList.add('on'); document.getElementById('success').classList.remove('on'); }
function showSuccess(msg) { const e = document.getElementById('success'); e.textContent = msg; e.classList.add('on'); document.getElementById('error').classList.remove('on'); }
function hideMessages() { document.getElementById('error').classList.remove('on'); document.getElementById('success').classList.remove('on'); }

async function doLogin() {
  hideMessages();
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-pass').value;
  if (!email || !password) return showError('Remplis tous les champs 🙄');
  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = 'Connexion...';
  try {
    const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
    const data = await res.json();
    if (!res.ok) return showError(data.error || 'Email ou mot de passe incorrect.');
    localStorage.setItem('ph_token', data.token);
    localStorage.setItem('ph_user', JSON.stringify(data.user));
    btn.textContent = '✅ Connexion réussie !';
    setTimeout(() => window.location.href = '/app', 400);
  } catch { showError('Pas de connexion. Vérifie ton réseau 📡'); }
  finally { btn.disabled = false; if (btn.textContent === 'Connexion...') btn.textContent = 'Let\'s go 🚀'; }
}

async function doRegister() {
  hideMessages();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-pass').value;
  const password2 = document.getElementById('reg-pass2').value;
  if (!email || !password || !password2) return showError('Tous les champs sont requis.');
  if (password !== password2) return showError('Les mots de passe ne correspondent pas 🙃');
  if (password.length < 6) return showError('Mot de passe trop court (6 car. mini).');
  const btn = document.getElementById('btn-register');
  btn.disabled = true; btn.textContent = 'Création...';
  try {
    const res = await fetch('/api/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password, referral_code: refCode || undefined }) });
    const data = await res.json();
    if (!res.ok) return showError(data.error || 'Erreur lors de l\'inscription.');
    localStorage.setItem('ph_token', data.token);
    localStorage.setItem('ph_user', JSON.stringify(data.user));
    btn.textContent = '👑 Bienvenue boss !';
    setTimeout(() => window.location.href = '/app', 500);
  } catch { showError('Pas de réseau 📡'); }
  finally { btn.disabled = false; }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.getElementById('form-login').classList.contains('on')) doLogin();
    else doRegister();
  }
});
</script>
</body>
</html>
