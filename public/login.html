<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProspectHunter — Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #03050f;
      --surface: #060c1e;
      --card: #0b1128;
      --border: #1a2040;
      --border2: #232b4a;
      --grad: linear-gradient(135deg, #ef4444 0%, #e11d48 60%, #f97316 100%);
      --blue: #ef4444;
      --text: #e8eaf6;
      --text2: #8892b0;
      --muted: #4a5268;
      --red-tx: #f87171;
      --red-bg: rgba(239,68,68,.06);
      --red-bd: rgba(239,68,68,.2);
      --green: #22c55e;
      --green-bg: rgba(34,197,94,.06);
      --green-bd: rgba(34,197,94,.2);
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      -webkit-font-smoothing: antialiased;
      position: relative; overflow: hidden;
    }

    /* Background glow */
    body::before {
      content: '';
      position: fixed; top: -20%; left: 50%; transform: translateX(-50%);
      width: 800px; height: 500px;
      background: radial-gradient(ellipse, rgba(239,68,68,.08) 0%, rgba(225,29,72,.04) 50%, transparent 70%);
      pointer-events: none;
    }

    .login-box {
      background: rgba(11,17,40,.85);
      border: 1px solid var(--border2);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%; max-width: 420px;
      position: relative; z-index: 1;
      backdrop-filter: blur(20px);
      box-shadow: 0 8px 40px rgba(0,0,0,.5), 0 0 0 1px rgba(239,68,68,.08);
    }

    .logo { text-align: center; margin-bottom: 2rem; }
    .logo-icon {
      width: 48px; height: 48px; margin: 0 auto .75rem;
      background: var(--grad); border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      box-shadow: 0 4px 20px rgba(239,68,68,.3);
    }
    .logo h1 {
      font-size: 1.4rem; font-weight: 800; letter-spacing: -.03em;
      background: var(--grad);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo p { color: var(--muted); font-size: .82rem; margin-top: .3rem; }

    .tabs { display: flex; margin-bottom: 1.5rem; gap: .4rem; }
    .tab {
      flex: 1; padding: .6rem; background: transparent;
      border: 1px solid var(--border2);
      border-radius: 9px; color: var(--muted); font-weight: 600; font-size: .82rem;
      cursor: pointer; transition: all .15s; text-align: center; font-family: inherit;
    }
    .tab:hover { color: var(--text2); border-color: #2e3860; }
    .tab.on {
      background: rgba(239,68,68,.12); border-color: rgba(239,68,68,.35);
      color: var(--text);
    }

    .form { display: none; }
    .form.on { display: block; }

    .field { margin-bottom: 1rem; }
    .field label {
      display: block; font-size: .7rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .06em; margin-bottom: .4rem;
    }
    .inp {
      width: 100%; background: rgba(6,12,30,.8); border: 1px solid var(--border2);
      border-radius: 9px; padding: .75rem 1rem; color: var(--text); font-size: .88rem;
      outline: none; font-family: inherit; transition: border-color .15s;
    }
    .inp:focus { border-color: rgba(239,68,68,.5); box-shadow: 0 0 0 3px rgba(239,68,68,.08); }
    .inp::placeholder { color: var(--muted); }

    .btn {
      width: 100%; padding: .85rem; margin-top: .75rem;
      background: var(--grad); color: #fff;
      border: none; border-radius: 9px;
      font-size: .92rem; font-weight: 800; cursor: pointer;
      font-family: inherit; transition: opacity .15s;
      box-shadow: 0 4px 20px rgba(239,68,68,.35);
    }
    .btn:hover { opacity: .9; }
    .btn:disabled { opacity: .35; cursor: not-allowed; }

    .error {
      background: var(--red-bg); border: 1px solid var(--red-bd); border-radius: 9px;
      padding: .7rem 1rem; color: var(--red-tx); font-size: .82rem;
      margin-bottom: 1rem; display: none;
    }
    .error.on { display: block; }

    .success {
      background: var(--green-bg); border: 1px solid var(--green-bd); border-radius: 9px;
      padding: .7rem 1rem; color: var(--green); font-size: .82rem;
      margin-bottom: 1rem; display: none;
    }
    .success.on { display: block; }

    .login-footer {
      text-align: center; margin-top: 1.5rem;
      font-size: .75rem; color: var(--muted);
    }
    .login-footer a { color: var(--blue); }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">
      <div class="logo-icon">🎯</div>
      <h1>ProspectHunter</h1>
      <p>Connecte-toi pour prospecter</p>
    </div>

    <div class="tabs">
      <button class="tab on" onclick="showTab('login')">J'ai un compte 😎</button>
      <button class="tab" onclick="showTab('register')">Je veux ma place 🔥</button>
    </div>

    <div id="error" class="error"></div>
    <div id="success" class="success"></div>

    <!-- Login form -->
    <div id="form-login" class="form on">
      <div class="field">
        <label>Email</label>
        <input class="inp" type="email" id="login-email" placeholder="tonmail@business.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <input class="inp" type="password" id="login-pass" placeholder="Ton mot de passe secret 🤫" autocomplete="current-password">
      </div>
      <button class="btn" id="btn-login" onclick="doLogin()">Let's go 🚀</button>
    </div>

    <!-- Register form -->
    <div id="form-register" class="form">
      <div class="field">
        <label>Email</label>
        <input class="inp" type="email" id="reg-email" placeholder="boss@empire.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <input class="inp" type="password" id="reg-pass" placeholder="Un truc solide (6 car. mini)" autocomplete="new-password">
      </div>
      <div class="field">
        <label>Confirmer le mot de passe</label>
        <input class="inp" type="password" id="reg-pass2" placeholder="Le même, en mieux 😤" autocomplete="new-password">
      </div>
      <button class="btn" id="btn-register" onclick="doRegister()">Créer mon empire 👑</button>
    </div>

    <div class="login-footer">
      <a href="/">← Retour à l'accueil</a>
    </div>
  </div>

<script>
// If already logged in, redirect
if (localStorage.getItem('ph_token')) {
  window.location.href = '/app';
}

// URL params
const urlParams = new URLSearchParams(window.location.search);
const refCode = urlParams.get('ref');
const tabParam = urlParams.get('tab');
if (tabParam === 'register') {
  setTimeout(() => showTab('register'), 50);
}
if (refCode) {
  setTimeout(() => {
    showTab('register');
    showSuccess('Ton pote t\'a invité ! Inscris-toi et récupère 5 crédits gratuits 🎁');
  }, 100);
}

function showTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('on', i === (tab === 'login' ? 0 : 1)));
  document.getElementById('form-login').classList.toggle('on', tab === 'login');
  document.getElementById('form-register').classList.toggle('on', tab === 'register');
  hideMessages();
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg; el.classList.add('on');
  document.getElementById('success').classList.remove('on');
}
function showSuccess(msg) {
  const el = document.getElementById('success');
  el.textContent = msg; el.classList.add('on');
  document.getElementById('error').classList.remove('on');
}
function hideMessages() {
  document.getElementById('error').classList.remove('on');
  document.getElementById('success').classList.remove('on');
}

async function doLogin() {
  hideMessages();
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-pass').value;
  if (!email || !password) return showError('Remplis tous les champs 🙄');

  document.getElementById('btn-login').disabled = true;
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!res.ok) return showError(data.error || 'Email ou mot de passe incorrect.');

    localStorage.setItem('ph_token', data.token);
    localStorage.setItem('ph_user', JSON.stringify(data.user));
    window.location.href = '/app';
  } catch (err) {
    showError('Pas de connexion. Vérifie ton réseau 📡');
  } finally {
    document.getElementById('btn-login').disabled = false;
  }
}

async function doRegister() {
  hideMessages();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-pass').value;
  const password2 = document.getElementById('reg-pass2').value;

  if (!email || !password || !password2) return showError('Tous les champs sont requis.');
  if (password !== password2) return showError('Les mots de passe ne correspondent pas.');
  if (password.length < 6) return showError('Mot de passe trop court (6 caractères minimum).');

  document.getElementById('btn-register').disabled = true;
  try {
    const res = await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, referral_code: refCode || undefined }),
    });
    const data = await res.json();
    if (!res.ok) return showError(data.error || 'Erreur lors de l\'inscription.');

    localStorage.setItem('ph_token', data.token);
    localStorage.setItem('ph_user', JSON.stringify(data.user));
    window.location.href = '/app';
  } catch (err) {
    showError('Pas de réseau. Vérifie ta connexion 📡');
  } finally {
    document.getElementById('btn-register').disabled = false;
  }
}

// Enter key support
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    if (document.getElementById('form-login').classList.contains('on')) doLogin();
    else doRegister();
  }
});
</script>
</body>
</html>
